name: warehouse-stock

services:
  db:
    image: mysql:8.0
    container_name: warehouse-stock-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-warehouse_root_pwd}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-warehouse_stock}
      MYSQL_USER: ${MYSQL_USER:-warehouse_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-warehouse_pwd}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - warehouse-stock-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${MYSQL_USER:-warehouse_user} -p${MYSQL_PASSWORD:-warehouse_pwd} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - warehouse-stock-net

  backend:
    build:
      context: ./backend
    container_name: warehouse-stock-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${MYSQL_USER:-warehouse_user}:${MYSQL_PASSWORD:-warehouse_pwd}@db:3306/${MYSQL_DATABASE:-warehouse_stock}
      JWT_SECRET: ${JWT_SECRET:-warehouse-stock-local-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - warehouse-stock-net

  frontend:
    build:
      context: ./frontend
    container_name: warehouse-stock-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - warehouse-stock-net

volumes:
  warehouse-stock-mysql-data:

networks:
  warehouse-stock-net:
    driver: bridge
